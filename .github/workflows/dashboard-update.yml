name: Dashboard scheduled updates

on:
  schedule:
    # GitHub cron is UTC. These schedules cover 07:00-23:00 Asia/Taipei (UTC+8).
    # 23:00-23:55 UTC = 07:00-07:55 Asia/Taipei.
    - cron: "*/5 23 * * *"
    # 00:00-14:55 UTC = 08:00-22:55 Asia/Taipei.
    - cron: "*/5 0-14 * * *"
    # 15:00 UTC = 23:00 Asia/Taipei.
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: dashboard-scheduled-updates
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      DASHBOARD_BASE_URL: ${{ secrets.TWSE_DASHBOARD_BASE_URL }}
      UPDATE_TOKEN: ${{ secrets.TWSE_DASHBOARD_UPDATE_TOKEN }}

    steps:
      - name: Check Taipei monitoring window
        id: window
        shell: python
        run: |
          import os
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Asia/Taipei"))
          manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          # Safety gate in Asia/Taipei time. Manual dispatch always runs.
          in_window = time(7, 0) <= now.time().replace(tzinfo=None) <= time(23, 0)
          should_run = manual or in_window

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_run={str(should_run).lower()}\n")
              output.write(f"taipei_now={now.isoformat(timespec='seconds')}\n")

          print(f"taipei_now={now.isoformat(timespec='seconds')}")
          print(f"should_run={should_run}")

      - name: Validate required secrets
        if: steps.window.outputs.should_run == 'true'
        shell: bash
        run: |
          test -n "$DASHBOARD_BASE_URL"
          test -n "$UPDATE_TOKEN"

      - name: Update material info and self-reported cache
        id: material_info
        if: steps.window.outputs.should_run == 'true'
        continue-on-error: true
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 15 \
            --retry-max-time 420 \
            --retry-connrefused \
            --connect-timeout 20 \
            --max-time 240 \
            -X POST \
            "${DASHBOARD_BASE_URL%/}/api/admin/update" \
            -H "Authorization: Bearer $UPDATE_TOKEN"

      - name: Update monthly revenue cache
        id: monthly_revenue
        if: steps.window.outputs.should_run == 'true'
        continue-on-error: true
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 15 \
            --retry-max-time 420 \
            --retry-connrefused \
            --connect-timeout 20 \
            --max-time 240 \
            -X POST \
            "${DASHBOARD_BASE_URL%/}/api/admin/update-monthly-revenue" \
            -H "Authorization: Bearer $UPDATE_TOKEN"

      - name: Update financial report cache
        id: financial_report
        if: steps.window.outputs.should_run == 'true'
        continue-on-error: true
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 15 \
            --retry-max-time 420 \
            --retry-connrefused \
            --connect-timeout 20 \
            --max-time 240 \
            -X POST \
            "${DASHBOARD_BASE_URL%/}/api/admin/update-financial-report" \
            -H "Authorization: Bearer $UPDATE_TOKEN"

      - name: Summarize update endpoint results
        if: steps.window.outputs.should_run == 'true'
        shell: bash
        env:
          MATERIAL_INFO_OUTCOME: ${{ steps.material_info.outcome }}
          MONTHLY_REVENUE_OUTCOME: ${{ steps.monthly_revenue.outcome }}
          FINANCIAL_REPORT_OUTCOME: ${{ steps.financial_report.outcome }}
        run: |
          {
            echo "### Dashboard scheduled updates"
            echo ""
            echo "| Endpoint | Result |"
            echo "| --- | --- |"
            echo "| material info and self-reported cache | ${MATERIAL_INFO_OUTCOME:-skipped} |"
            echo "| monthly revenue cache | ${MONTHLY_REVENUE_OUTCOME:-skipped} |"
            echo "| financial report cache | ${FINANCIAL_REPORT_OUTCOME:-skipped} |"
          } >> "$GITHUB_STEP_SUMMARY"

          failed=0
          for outcome in \
            "$MATERIAL_INFO_OUTCOME" \
            "$MONTHLY_REVENUE_OUTCOME" \
            "$FINANCIAL_REPORT_OUTCOME"
          do
            if [ "$outcome" != "success" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more update endpoints failed after retries." >&2
            exit 1
          fi
